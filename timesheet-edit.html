<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Timesheet PDF Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- React + ReactDOM + Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- pdf-lib -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <!-- html2canvas -->
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          sans-serif;
        background: #f5f5f7;
        color: #111827;
      }

      .app-root {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .editor-card {
        background: #ffffff;
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
        padding: 16px;
        max-width: 960px;
        width: 100%;
      }

      .app-title {
        margin: 0 0 12px;
        font-size: 20px;
        font-weight: 600;
        text-align: center;
      }

      .pdf-wrapper {
        position: relative;
        margin: 0 auto;
        overflow: hidden;
      }

      .pdf-canvas {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 12px;
      }

      .overlay-container {
        position: absolute;
        top: 0;
        left: 0;
      }

      .overlay-input {
        position: absolute;
        font-size: 11px;
        padding: 2px 4px;
        border-radius: 4px;
        border: 1px solid rgba(148, 163, 184, 0.7);
        background: rgba(255, 255, 255, 0.9);
        outline: none;
      }

      .overlay-input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.3);
      }

      .btn-primary,
      .btn-secondary {
        border-radius: 999px;
        padding: 8px 16px;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: transform 0.1s ease, box-shadow 0.1s ease,
          background 0.1s ease;
      }

      .btn-primary {
        background: #111827;
        color: #ffffff;
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.25);
      }

      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.3);
      }

      .btn-secondary {
        background: #e5e7eb;
        color: #111827;
      }

      .btn-secondary:hover {
        background: #d1d5db;
      }

      .btn-secondary:disabled,
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: default;
        box-shadow: none;
        transform: none;
      }

      .sign-btn {
        position: absolute;
        right: 12px;
        bottom: 12px;
      }

      .export-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
      }

      .modal-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 16px;
        width: 90%;
        max-width: 480px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      }

      .signature-canvas {
        width: 100%;
        border-radius: 12px;
        border: 1px solid #cbd5f5;
        background: #f9fafb;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 12px;
      }

      @media (min-width: 768px) {
        .editor-card {
          padding: 24px;
        }

        .app-title {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // PDF.js global config
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      function PdfCanvas({ onSize }) {
        const canvasRef = useRef(null);

        useEffect(() => {
          const loadPdf = async () => {
            try {
              const pdf = await pdfjsLib.getDocument("pro.pdf").promise;
              const page = await pdf.getPage(1);

              const containerWidth = Math.min(window.innerWidth - 32, 900);
              const viewport = page.getViewport({ scale: 1 });
              const scale = containerWidth / viewport.width;
              const scaledViewport = page.getViewport({ scale });

              const canvas = canvasRef.current;
              const ctx = canvas.getContext("2d");
              canvas.width = scaledViewport.width;
              canvas.height = scaledViewport.height;

              await page.render({
                canvasContext: ctx,
                viewport: scaledViewport,
              }).promise;

              onSize({ width: canvas.width, height: canvas.height });
            } catch (e) {
              console.error("Error loading PDF:", e);
            }
          };

          loadPdf();
          const handleResize = () => {
            loadPdf();
          };
          window.addEventListener("resize", handleResize);
          return () => window.removeEventListener("resize", handleResize);
        }, [onSize]);

        return <canvas ref={canvasRef} className="pdf-canvas" />;
      }

      const rows = [
        "monday",
        "tuesday",
        "wednesday",
        "thursday",
        "friday",
        "saturday",
        "sunday",
      ];

      function TableOverlay({ pdfSize, tableData, setTableData }) {
        const { width, height } = pdfSize;

        const tableTop = 0.32 * height;
        const rowHeight = 0.055 * height;
        const colLefts = {
          date: 0.18 * width,
          start: 0.32 * width,
          lunch: 0.46 * width,
          finish: 0.60 * width,
          total: 0.74 * width,
          comments: 0.82 * width,
        };
        const colWidths = {
          date: 0.12 * width,
          start: 0.12 * width,
          lunch: 0.12 * width,
          finish: 0.12 * width,
          total: 0.08 * width,
          comments: 0.16 * width,
        };

        const handleChange = (dayKey, field, value) => {
          setTableData((prev) => ({
            ...prev,
            [dayKey]: {
              ...prev[dayKey],
              [field]: value,
            },
          }));
        };

        return (
          <div className="overlay-container">
            {rows.map((dayKey, index) => {
              const rowTop = tableTop + index * rowHeight;
              const row = tableData[dayKey];

              return (
                <div key={dayKey}>
                  <input
                    className="overlay-input"
                    style={{
                      top: rowTop,
                      left: colLefts.date,
                      width: colWidths.date,
                    }}
                    value={row.date}
                    onChange={(e) =>
                      handleChange(dayKey, "date", e.target.value)
                    }
                  />
                  <input
                    className="overlay-input"
                    style={{
                      top: rowTop,
                      left: colLefts.start,
                      width: colWidths.start,
                    }}
                    value={row.start}
                    onChange={(e) =>
                      handleChange(dayKey, "start", e.target.value)
                    }
                  />
                  <input
                    className="overlay-input"
                    style={{
                      top: rowTop,
                      left: colLefts.lunch,
                      width: colWidths.lunch,
                    }}
                    value={row.lunch}
                    onChange={(e) =>
                      handleChange(dayKey, "lunch", e.target.value)
                    }
                  />
                  <input
                    className="overlay-input"
                    style={{
                      top: rowTop,
                      left: colLefts.finish,
                      width: colWidths.finish,
                    }}
                    value={row.finish}
                    onChange={(e) =>
                      handleChange(dayKey, "finish", e.target.value)
                    }
                  />
                  <input
                    className="overlay-input"
                    style={{
                      top: rowTop,
                      left: colLefts.total,
                      width: colWidths.total,
                    }}
                    value={row.total}
                    onChange={(e) =>
                      handleChange(dayKey, "total", e.target.value)
                    }
                  />
                  <input
                    className="overlay-input"
                    style={{
                      top: rowTop,
                      left: colLefts.comments,
                      width: colWidths.comments,
                    }}
                    value={row.comments}
                    onChange={(e) =>
                      handleChange(dayKey, "comments", e.target.value)
                    }
                  />
                </div>
              );
            })}
          </div>
        );
      }

      function SignaturePad({ onClose, onSave }) {
        const canvasRef = useRef(null);

        const startDrawing = (e) => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext("2d");
          ctx.strokeStyle = "#000";
          ctx.lineWidth = 2;
          ctx.beginPath();
          const rect = canvas.getBoundingClientRect();
          ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
          canvas.isDrawing = true;
        };

        const draw = (e) => {
          const canvas = canvasRef.current;
          if (!canvas.isDrawing) return;
          const ctx = canvas.getContext("2d");
          const rect = canvas.getBoundingClientRect();
          ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
          ctx.stroke();
        };

        const stopDrawing = () => {
          const canvas = canvasRef.current;
          canvas.isDrawing = false;
        };

        const clearCanvas = () => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext("2d");
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        };

        const handleSave = () => {
          const canvas = canvasRef.current;
          const dataUrl = canvas.toDataURL("image/png");
          onSave(dataUrl);
          onClose();
        };

        return (
          <div className="modal-backdrop">
            <div className="modal-card">
              <h2>Sign</h2>
              <canvas
                ref={canvasRef}
                width={400}
                height={150}
                className="signature-canvas"
                onMouseDown={startDrawing}
                onMouseMove={draw}
                onMouseUp={stopDrawing}
                onMouseLeave={stopDrawing}
              />
              <div className="modal-actions">
                <button className="btn-secondary" onClick={clearCanvas}>
                  Clear
                </button>
                <button className="btn-secondary" onClick={onClose}>
                  Cancel
                </button>
                <button className="btn-primary" onClick={handleSave}>
                  Save
                </button>
              </div>
            </div>
          </div>
        );
      }

      function SignatureButton({ pdfSize, signatureDataUrl, setSignatureDataUrl }) {
        const [open, setOpen] = useState(false);
        const { width, height } = pdfSize;

        if (!width || !height) return null;

        const sigWidth = 0.25 * width;
        const sigHeight = 0.08 * height;
        const sigLeft = width - sigWidth - 0.05 * width;
        const sigTop = height - sigHeight - 0.08 * height;

        return (
          <>
            <button
              className="btn-primary sign-btn"
              onClick={() => setOpen(true)}
            >
              Sign
            </button>

            {signatureDataUrl && (
              <img
                src={signatureDataUrl}
                alt="Signature"
                style={{
                  position: "absolute",
                  left: sigLeft,
                  top: sigTop,
                  width: sigWidth,
                  height: sigHeight,
                  objectFit: "contain",
                  pointerEvents: "none",
                }}
              />
            )}

            {open && (
              <SignaturePad
                onClose={() => setOpen(false)}
                onSave={setSignatureDataUrl}
              />
            )}
          </>
        );
      }

      async function exportPdf() {
        const wrapper = document.getElementById("pdf-wrapper");
        const canvas = await html2canvas(wrapper, { scale: 2 });
        const imgData = canvas.toDataURL("image/png");

        const existingPdfBytes = await fetch("./pro.pdf").then((res) =>
          res.arrayBuffer()
        );
        const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
        const page = pdfDoc.getPage(0);
        const pngImage = await pdfDoc.embedPng(imgData);
        const { width, height } = page.getSize();

        page.drawImage(pngImage, {
          x: 0,
          y: 0,
          width,
          height,
        });

        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "timesheet-edited.pdf";
        link.click();
      }

      async function exportJpeg() {
        const wrapper = document.getElementById("pdf-wrapper");
        const canvas = await html2canvas(wrapper, { scale: 2 });
        const dataUrl = canvas.toDataURL("image/jpeg", 0.95);

        const link = document.createElement("a");
        link.href = dataUrl;
        link.download = "timesheet-edited.jpg";
        link.click();
      }

      function ExportButtons({ pdfSize }) {
        const disabled = !pdfSize.width;

        return (
          <div className="export-row">
            <button
              className="btn-secondary"
              onClick={exportPdf}
              disabled={disabled}
            >
              Download PDF
            </button>
            <button
              className="btn-secondary"
              onClick={exportJpeg}
              disabled={disabled}
            >
              Download JPEG
            </button>
          </div>
        );
      }

      function App() {
        const [pdfSize, setPdfSize] = useState({ width: 0, height: 0 });
        const [tableData, setTableData] = useState({
          monday: {
            date: "",
            start: "",
            lunch: "",
            finish: "",
            total: "",
            comments: "",
          },
          tuesday: {
            date: "",
            start: "",
            lunch: "",
            finish: "",
            total: "",
            comments: "",
          },
          wednesday: {
            date: "",
            start: "",
            lunch: "",
            finish: "",
            total: "",
            comments: "",
          },
          thursday: {
            date: "",
            start: "",
            lunch: "",
            finish: "",
            total: "",
            comments: "",
          },
          friday: {
            date: "",
            start: "",
            lunch: "",
            finish: "",
            total: "",
            comments: "",
          },
          saturday: {
            date: "",
            start: "",
            lunch: "",
            finish: "",
            total: "",
            comments: "",
          },
          sunday: {
            date: "",
            start: "",
            lunch: "",
            finish: "",
            total: "",
            comments: "",
          },
        });

        const [signatureDataUrl, setSignatureDataUrl] = useState(null);

        return (
          <div className="app-root">
            <div className="editor-card">
              <h1 className="app-title">Timesheet Editor</h1>
              <div className="pdf-wrapper" id="pdf-wrapper">
                <PdfCanvas onSize={setPdfSize} />
                {pdfSize.width > 0 && (
                  <TableOverlay
                    pdfSize={pdfSize}
                    tableData={tableData}
                    setTableData={setTableData}
                  />
                )}
                <SignatureButton
                  pdfSize={pdfSize}
                  signatureDataUrl={signatureDataUrl}
                  setSignatureDataUrl={setSignatureDataUrl}
                />
              </div>
              <ExportButtons pdfSize={pdfSize} />
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
